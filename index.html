<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CNY Angpao Keeper</title>
  <link rel="stylesheet" href="style.css">
  <!-- Preload the large background image to prioritize loading -->
  <link rel="preload" href="gemini angpao and notebook on desk.png" as="image">
</head>

<body>

  <main class="desk-container">
    <div class="interactive-layer">
      <!-- SVG Dimming Overlay (Active only in Edit Mode) -->
      <svg id="edit-mode-overlay" class="edit-mode-overlay" width="100%" height="100%">
        <defs>
          <mask id="spotlight-mask">
            <!-- White = fully opaque (drawn darkness) -->
            <rect width="100%" height="100%" fill="white" />
            <!-- Black = fully transparent (punched holes) -->
            <rect class="mask-hole mask-notebook" rx="8" fill="black" />
            <rect class="mask-hole mask-pen" rx="10" fill="black" />
          </mask>
        </defs>
        <rect width="100%" height="100%" fill="rgba(0,0,0,0.4)" mask="url(#spotlight-mask)" />
      </svg>
      <!-- Interactive Clickable Hotspots mapped directly over the background image -->
      <div id="hotspot-angpao" class="hotspot hotspot-angpao" title="Add Angpao"></div>
      <div id="hotspot-pen" class="hotspot hotspot-pen" title="Toggle Edit Mode"></div>

      <!-- List renderer mapped to the notebook rect -->
      <div id="notebook-container" class="notebook-list view-only">
        <ul id="angpao-list"></ul>
        <div id="angpao-total" class="angpao-total-row">
          <span>Total</span>
          <span id="angpao-total-value" class="entry-amount">$0</span>
        </div>
      </div>

      <!-- Sort Toggle Button -->
      <button id="btn-sort" class="sort-toggle-btn icon-btn" title="Toggle Sort by Amount">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sort-icon">
          <line x1="4" y1="6" x2="20" y2="6"></line>
          <line x1="4" y1="12" x2="14" y2="12"></line>
          <line x1="4" y1="18" x2="8" y2="18"></line>
        </svg>
      </button>
    </div>
  </main>

  <!-- Add Angpao Modal Dialog -->
  <dialog id="add-angpao-modal" class="cny-modal">
    <form method="dialog" id="add-angpao-form">
      <h2 id="modal-title">Add Angpao</h2>

      <div class="form-row">
        <div class="input-group from-group">
          <label for="angpao-from">From:</label>
          <input type="text" id="angpao-from" name="from" required placeholder="e.g. Grandma" autocomplete="off" />
        </div>

        <div class="input-group amount-group">
          <label for="angpao-amount">Amount:</label>
          <input type="number" id="angpao-amount" name="amount" required placeholder="e.g. 50" min="0" step="1" />
        </div>
      </div>

      <menu class="modal-actions">
        <button type="button" class="btn-cancel" id="btn-cancel-add">Cancel</button>
        <button type="submit" class="btn-submit" id="btn-submit-modal">Add Record</button>
      </menu>
    </form>
  </dialog>

  <script type="module" src="main.js"></script>
  <script type="module" src="interactions.js"></script>
</body>

</html>
